name: Vercel Deploy

on:
  push:
    branches:
      - test
      - pre
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref_name || github.head_ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ${{ github.event_name == 'release' && 'Prod' || github.ref_name == 'pre' && 'Pre' || 'Test' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'release' && 'prod' || github.ref_name }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Validate release target
        if: github.event_name == 'release' && github.event.release.target_commitish != 'master'
        run: |
          echo "Prod release deployments must target the master branch."
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.target_commitish || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.3
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Pull Vercel environment
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            npx vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"
          fi

      - name: Build with Vercel
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            npx vercel@latest build --prod --token="$VERCEL_TOKEN"
          else
            npx vercel@latest build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            url=$(npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          else
            url=$(npx vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN")
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Alias deployment
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            domain="dingnan.vercel.app"
          elif [ "$GITHUB_REF_NAME" = "pre" ]; then
            domain="pre-dingnan.vercel.app"
          else
            domain="test-dingnan.vercel.app"
          fi
          npx vercel@latest alias set "${{ steps.deploy.outputs.url }}" "$domain" --token="$VERCEL_TOKEN"
