name: AI Code Review

on:
  pull_request:
    branches:
      - pre
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Frontend Guidelines Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Review changed frontend files
        run: node scripts/ai-review-changed-files.cjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_REVIEW_API_KEY: ${{ secrets.AI_REVIEW_API_KEY }}
          AI_REVIEW_BASE_URL: ${{ vars.AI_REVIEW_BASE_URL || secrets.AI_REVIEW_BASE_URL }}
          AI_REVIEW_MODEL: ${{ vars.AI_REVIEW_MODEL || secrets.AI_REVIEW_MODEL }}

      - name: Upload AI review report
        id: upload-ai-review-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-code-review-report
          path: reports/ai-code-review-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Update AI review report link
        if: always() && steps.upload-ai-review-report.outputs.artifact-url != ''
        run: node scripts/ai-review-changed-files.cjs --update-report-url
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AI_REVIEW_REPORT_URL: ${{ steps.upload-ai-review-report.outputs.artifact-url }}
